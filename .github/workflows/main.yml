name: SonarCloud

permissions:
  contents: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          gradle-version: 8.14

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.14

      - name: Create local.properties
        env:
          ACTIONPILOT_GEMINI_API_KEY: ${{ secrets.ACTIONPILOT_GEMINI_API_KEY }}
        run: |
          echo "ACTIONPILOT_GEMINI_API_KEY=$ACTIONPILOT_GEMINI_API_KEY" > local.properties

      - name: Generate Gradle verification metadata
        run: gradle --write-verification-metadata sha256 build

      - name: Commit Gradle wrapper and verification metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/ gradle/verification-metadata.xml
          git commit -m "Add Gradle wrapper and dependency verification metadata" || echo "No changes to commit"
          git push

      - name: Run Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: gradle sonar
